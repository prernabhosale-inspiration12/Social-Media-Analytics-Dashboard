{% extends "base.html" %}

{% block title %}
Edit Post
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-warning">

            <h3>

                ✏ Edit Post

            </h3>

        </div>

        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">

                        Department

                    </label>

                    {{ form.department }}

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Caption

                    </label>

                    {{ form.caption }}

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Current Image

                    </label>

                    <br>

                    {% if form.instance.image %}

                        <img
                            src="{{ form.instance.image.url }}"
                            width="180"
                            class="img-thumbnail mb-3">

                    {% else %}

                        <p class="text-muted">

                            No Image Uploaded

                        </p>

                    {% endif %}

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Change Image

                    </label>

                    {{ form.image }}

                </div>

                <button
                    type="submit"
                    class="btn btn-warning">

                    💾 Update Post

                </button>

                <a
                    href="{% url 'post_list' %}"
                    class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
