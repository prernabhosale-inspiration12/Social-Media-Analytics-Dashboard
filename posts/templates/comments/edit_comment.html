{% extends "base.html" %}

{% block title %}
Edit Comment
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-warning text-dark">

            <h3>✏️ Edit Comment</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">
                        User
                    </label>
                    {{ form.user }}
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Post
                    </label>
                    {{ form.post }}
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Comment
                    </label>
                    {{ form.comment }}
                </div>

                <button type="submit" class="btn btn-warning">
                    💾 Update
                </button>

                <a href="{% url 'comment_list' %}" class="btn btn-secondary">
                    Back
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
